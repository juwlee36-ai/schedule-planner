<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beautiful Calculator</title>
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --card-border: rgba(255, 255, 255, 0.2);
      --text-main: #e2e8f0;
      --text-sub: #94a3b8;
      --accent: #22d3ee;
      --accent-2: #a78bfa;
      --btn: rgba(255, 255, 255, 0.1);
      --btn-hover: rgba(255, 255, 255, 0.18);
      --danger: #fb7185;
      --equal: #34d399;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top right, #334155 0%, transparent 45%),
        radial-gradient(circle at bottom left, #3b0764 0%, transparent 40%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 24px;
    }

    .calculator {
      width: min(92vw, 380px);
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      font-size: 14px;
      color: var(--text-sub);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.8);
    }

    .display {
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 14px;
      margin-bottom: 14px;
      min-height: 106px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 8px;
      overflow: hidden;
    }

    .expression {
      min-height: 24px;
      color: var(--text-sub);
      font-size: 16px;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result {
      font-size: clamp(28px, 6vw, 40px);
      font-weight: 700;
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--btn);
      color: var(--text-main);
      border-radius: 14px;
      padding: 16px 0;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      background: var(--btn-hover);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .op {
      color: #67e8f9;
      border-color: rgba(103, 232, 249, 0.35);
    }

    .danger {
      color: #fecdd3;
      border-color: rgba(251, 113, 133, 0.45);
      background: rgba(244, 63, 94, 0.16);
    }

    .equal {
      background: linear-gradient(135deg, var(--equal), #10b981);
      color: #052e16;
      border: none;
      box-shadow: 0 10px 24px rgba(16, 185, 129, 0.35);
    }

    .span-2 {
      grid-column: span 2;
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="calculator app">
    <div class="brand">
      <span>Calculator</span>
      <span class="dot" aria-hidden="true"></span>
    </div>

    <section class="display" aria-live="polite">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </section>

    <section class="keys" id="keys">
      <button class="danger" data-action="clear">AC</button>
      <button class="danger" data-action="delete">DEL</button>
      <button class="op" data-value="%">%</button>
      <button class="op" data-value="/">/</button>

      <button data-value="7">7</button>
      <button data-value="8">8</button>
      <button data-value="9">9</button>
      <button class="op" data-value="*">*</button>

      <button data-value="4">4</button>
      <button data-value="5">5</button>
      <button data-value="6">6</button>
      <button class="op" data-value="-">-</button>

      <button data-value="1">1</button>
      <button data-value="2">2</button>
      <button data-value="3">3</button>
      <button class="op" data-value="+">+</button>

      <button class="span-2" data-value="0">0</button>
      <button data-value=".">.</button>
      <button class="equal" data-action="equals">=</button>
    </section>
  </main>

  <script>
    const expressionEl = document.getElementById("expression");
    const resultEl = document.getElementById("result");
    const keysEl = document.getElementById("keys");

    let expression = "";
    let lastResult = "";

    function sanitizeExpression(value) {
      return value.replace(/÷/g, "/").replace(/×/g, "*");
    }

    function safeEvaluate(value) {
      const cleaned = sanitizeExpression(value);
      if (!/^[0-9+\-*/%.() ]+$/.test(cleaned)) {
        throw new Error("Invalid expression");
      }

      const evaluated = Function(`"use strict"; return (${cleaned})`)();
      if (!Number.isFinite(evaluated)) {
        throw new Error("Math error");
      }
      return evaluated;
    }

    function formatNumber(num) {
      const asNumber = Number(num);
      if (!Number.isFinite(asNumber)) return "Error";
      return asNumber.toLocaleString(undefined, { maximumFractionDigits: 10 });
    }

    function updateDisplay() {
      expressionEl.textContent = expression || "";
      resultEl.textContent = expression ? previewResult() : "0";
    }

    function previewResult() {
      try {
        const value = safeEvaluate(expression);
        lastResult = String(value);
        return formatNumber(value);
      } catch {
        return expression ? "..." : "0";
      }
    }

    function appendValue(value) {
      const operators = "+-*/%";
      const lastChar = expression.slice(-1);

      if (operators.includes(value) && !expression) {
        return;
      }

      if (operators.includes(value) && operators.includes(lastChar)) {
        expression = expression.slice(0, -1) + value;
        updateDisplay();
        return;
      }

      if (value === ".") {
        const splitByOps = expression.split(/[+\-*/%]/);
        const currentChunk = splitByOps[splitByOps.length - 1];
        if (currentChunk.includes(".")) {
          return;
        }
      }

      expression += value;
      updateDisplay();
    }

    function clearAll() {
      expression = "";
      lastResult = "";
      updateDisplay();
    }

    function deleteOne() {
      expression = expression.slice(0, -1);
      updateDisplay();
    }

    function calculate() {
      if (!expression) return;
      try {
        const value = safeEvaluate(expression);
        expressionEl.textContent = expression;
        expression = String(value);
        resultEl.textContent = formatNumber(value);
      } catch {
        resultEl.textContent = "Error";
        expression = "";
      }
    }

    keysEl.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;

      const action = button.dataset.action;
      const value = button.dataset.value;

      if (action === "clear") return clearAll();
      if (action === "delete") return deleteOne();
      if (action === "equals") return calculate();
      if (value) appendValue(value);
    });

    document.addEventListener("keydown", (event) => {
      const { key } = event;
      if (/^[0-9]$/.test(key) || ["+", "-", "*", "/", "%", "."].includes(key)) {
        appendValue(key);
      } else if (key === "Enter" || key === "=") {
        event.preventDefault();
        calculate();
      } else if (key === "Backspace") {
        deleteOne();
      } else if (key === "Escape") {
        clearAll();
      }
    });

    updateDisplay();
  </script>
</body>
</html>
